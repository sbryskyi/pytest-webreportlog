
[pytest]
addopts =
    --import-mode=importlib
    --showlocals
    -v
    -ra
    --durations=10
    --junit-xml=reports/junit.xml
    --html=reports/report.html
    --self-contained-html
    # To stream live results to the viewer, add:
    #   --webreportlog-url=http://127.0.0.1:8000


junit_logging = all
junit_log_passing_tests = True

junit_suite_name = SystemX

log_level = DEBUG
log_format = %(asctime)s.%(msecs)03d [%(levelname).1s] %(message)s [%(name)s]
log_date_format = %m-%d %H:%M:%S

log_file_format = %(asctime)s.%(msecs)03d [%(levelname).1s] %(message)s [%(name)s]
log_file_date_format = %m-%d %H:%M:%S
