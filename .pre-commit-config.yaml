# Pre-commit hooks for pytest-webreportlog.
# Install once with:  uv run pre-commit install
# Run on demand with: uv run pre-commit run --all-files
#
# ruff and mypy run via `uv run` (repo: local) so their versions are pulled from
# uv.lock — a single source of truth, no duplicate pins to drift out of sync.
default_install_hook_types: [pre-commit]

repos:
  # Generic, language-agnostic file hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending
      - id: debug-statements

  # Keep uv.lock in sync with the pyproject.toml files.
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.8.11
    hooks:
      - id: uv-lock

  # Lint, format, and type-check using the versions resolved in uv.lock.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types_or: [python, pyi]
        # mypy resolves the whole package from [tool.mypy] files; don't pass
        # individual changed paths or cross-module imports break.
        pass_filenames: false
        require_serial: true
