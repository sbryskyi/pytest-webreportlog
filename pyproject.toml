# Virtual workspace root for the pytest-webreportlog monorepo.
# Ships two independent distributions:
#   - packages/plugin  -> pytest-webreportlog   (the pytest plugin; deps: pytest)
#   - packages/server  -> webreportlog-server   (the web viewer; deps: fastapi, ...)
[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
pytest-webreportlog = { workspace = true }
webreportlog-server = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-html>=4.1.1",
    "requests>=2.32.0",
    "ruff>=0.14.0",
    # workspace members, installed editable into the shared dev venv
    "pytest-webreportlog",
    "webreportlog-server",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Prevent pytest from collecting SQLModel classes as tests
python_classes = ["Test*", "!TestReport", "!TestPhase"]
filterwarnings = [
    "ignore:cannot collect test class 'Session':pytest.PytestCollectionWarning",
    "ignore:cannot collect test class 'TestReport':pytest.PytestCollectionWarning",
    "ignore:cannot collect test class 'TestPhase':pytest.PytestCollectionWarning",
]
markers = [
    "web: marks tests that require the web server (deselect with '-m \"not web\"')",
    "plugin: marks tests for the pytest plugin",
    "reports: marks tests for report format validation",
    "unit: marks unit tests",
    "slow: marks slow tests",
]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
# B008: FastAPI uses function calls (Depends/File/...) in argument defaults by design.
ignore = ["E501", "B008"]
