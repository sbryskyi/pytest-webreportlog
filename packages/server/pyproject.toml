[project]
name = "webreportlog-server"
version = "0.2.0"
description = "Web viewer for live pytest results streamed by the pytest-webreportlog plugin"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Sergii" },
]
keywords = [
    "pytest",
    "testing",
    "reports",
    "dashboard",
    "web",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Web Environment",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Typing :: Typed",
]
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sqlmodel>=0.0.22",
    "jinja2>=3.1.4",
    "ansi2html>=1.9.2",
    "typer>=0.15.0",
]

[project.scripts]
webreportlog-server = "webreportlog_server.cli:app"

[project.urls]
Homepage = "https://github.com/sbryskyi/pytest-webreportlog"
Documentation = "https://github.com/sbryskyi/pytest-webreportlog#readme"
Repository = "https://github.com/sbryskyi/pytest-webreportlog"
Issues = "https://github.com/sbryskyi/pytest-webreportlog/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/webreportlog_server"]
