[project]
name = "pytest-webreportlog"
version = "0.2.0"
description = "Pytest plugin that streams live test results to the webreportlog web viewer"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Sergii" },
]
keywords = [
    "pytest",
    "testing",
    "reports",
    "streaming",
    "dashboard",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Pytest",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
dependencies = [
    "pytest>=8.0.0",
]

[project.entry-points.pytest11]
webreportlog = "pytest_webreportlog.plugin"

[project.urls]
Homepage = "https://github.com/sbryskyi/pytest-webreportlog"
Repository = "https://github.com/sbryskyi/pytest-webreportlog"
Issues = "https://github.com/sbryskyi/pytest-webreportlog/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pytest_webreportlog"]
